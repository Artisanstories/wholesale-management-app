<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta
    http-equiv="Content-Security-Policy"
    content="frame-ancestors https://admin.shopify.com https://*.myshopify.com;"
  />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wholesale Dashboard</title>

  <!-- Lightweight styles to look decent until we wire Polaris React -->
  <style>
    :root { --bg:#0d1117; --panel:#161b22; --text:#e6edf3; --muted:#8b949e; --brand:#47c97f; --border:#30363d;}
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0;background:var(--bg);color:var(--text);font:14px/1.5 system-ui, -apple-system, Segoe UI, Roboto, Arial}
    .wrap{max-width:1100px;margin:32px auto;padding:0 16px}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:20px}
    .title{display:flex;align-items:center;gap:10px;font-size:24px;margin:0 0 8px}
    .title .badge{display:inline-block;background:rgba(71,201,127,.15);color:var(--brand);border:1px solid rgba(71,201,127,.35);padding:2px 8px;border-radius:999px;font-size:12px}
    .muted{color:var(--muted)}
    .row{display:flex;gap:12px;flex-wrap:wrap;margin-top:16px}
    .btn{appearance:none;border:1px solid var(--border);background:#1f6feb;color:#fff;border-radius:10px;padding:10px 14px;cursor:pointer}
    .btn.secondary{background:transparent;color:var(--text)}
    .panel{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;margin-top:16px}
    .tile{background:#0f141a;border:1px solid var(--border);border-radius:10px;padding:14px}
    .mono{font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace}
    a.btn {text-decoration: none;display:inline-block}
  </style>

  <!-- App Bridge UMD (v3.x is stable for our backend) -->
  <script src="https://unpkg.com/@shopify/app-bridge@3/umd/index.js"></script>
  <script src="https://unpkg.com/@shopify/app-bridge-utils@3/umd/index.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1 class="title">
        Wholesale Dashboard <span class="badge">embedded</span>
      </h1>
      <p class="muted" id="shopLine">Loading shop…</p>

      <div class="row">
        <button class="btn" id="checkApi">Check API</button>
        <a class="btn secondary" id="openAdmin" href="#" target="_top">Open Shopify Admin</a>
      </div>

      <div class="panel">
        <div class="tile">
          <strong>Install status</strong>
          <div class="muted" id="status">Waiting…</div>
        </div>
        <div class="tile">
          <strong>Scopes</strong>
          <div class="muted"><span id="scopes">read_products, write_products, read_customers, write_customers</span></div>
        </div>
        <div class="tile">
          <strong>API Key (injected)</strong>
          <div class="muted mono" id="apiKey"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      // %SHOPIFY_API_KEY% is replaced by the server in /embedded route
      const API_KEY = "%SHOPIFY_API_KEY%";

      // Parse query params Shopify sends (shop & host)
      const params = new URLSearchParams(location.search);
      const shop = params.get("shop") || "";
      const host = params.get("host") || "";
      document.getElementById("apiKey").textContent = API_KEY || "(missing)";
      document.getElementById("shopLine").textContent = shop ? "Shop: " + shop : "Shop not provided";

      // Initialize App Bridge (UMD)
      const createApp = window["app-bridge"].default;
      const actions = window["app-bridge"].actions;
      const utils = window["app-bridge-utils"];

      const app = createApp({
        apiKey: API_KEY,
        shopOrigin: shop,
        host,               // important for embedded navigation
        forceRedirect: true // ensure we stay embedded
      });

      // TitleBar
      const TitleBar = actions.TitleBar;
      TitleBar.create(app, { title: "Wholesale Dashboard" });

      // Toast helper
      const Toast = actions.Toast;
      function toast(msg, isError=false) {
        Toast.create(app, { message: msg, duration: 3000, isError }).dispatch(Toast.Action.SHOW);
      }

      // Open Shopify Admin button (top-level)
      document.getElementById("openAdmin").href = `https://admin.shopify.com/store/${shop.replace(".myshopify.com","")}`;

      // Check API button
      document.getElementById("checkApi").addEventListener("click", async () => {
        try {
          // If you later secure with session token, fetch it like:
          // const token = await utils.getSessionToken(app);
          const r = await fetch("/api/me", { credentials: "include" });
          const data = await r.json();
          toast(data?.message || "OK");
          document.getElementById("status").textContent = data?.message || "OK";
        } catch (e) {
          console.error(e);
          toast("API failed", true);
          document.getElementById("status").textContent = "API failed";
        }
      });
    })();
  </script>
</body>
</html>
