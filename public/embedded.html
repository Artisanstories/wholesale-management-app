<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Wholesale Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- App Bridge must load from Shopify CDN in embedded apps -->
  <script type="module" src="https://cdn.shopify.com/shopifycloud/app-bridge-utilities/v3/index.js"></script>
  <script type="module" src="https://cdn.shopify.com/shopifycloud/app-bridge/v3/app-bridge.min.js"></script>

  <!-- Polaris via CDN (simple to start; you can switch to React build later) -->
  <link rel="stylesheet" href="https://unpkg.com/@shopify/polaris@12.8.0/build/esm/styles.css" />
  <style>
    body { background: #0e1114; color: #e6e6e6; }
    .container { max-width: 1100px; margin: 24px auto; padding: 16px; }
    .card { background: #12161a; border: 1px solid #1f2328; border-radius: 12px; padding: 16px; }
    .row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-top: 16px; }
    .pill { background:#1b4b2e; color:#b6ffd0; border-radius:999px; padding:2px 10px; font-size:12px; margin-left:8px; }
    button.primary { background:#008060; color:#fff; border:0; border-radius:8px; padding:8px 12px; cursor:pointer }
    button.secondary { background:#1a1f24; color:#cfd5db; border:1px solid #2a3036; border-radius:8px; padding:8px 12px; cursor:pointer }
    .actions { display:flex; gap:10px; margin-top:12px; }
    .muted { color:#98a1ab; font-size:14px }
    .kvs { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1 style="display:flex;align-items:center;gap:8px;">
        Wholesale Dashboard
        <span class="pill">embedded</span>
      </h1>
      <p class="muted" id="shopLine">Shop:</p>
      <div class="actions">
        <button class="primary" id="checkApiBtn">Check API</button>
        <button class="secondary" id="openAdminBtn">Open Shopify Admin</button>
      </div>
    </div>

    <div class="row">
      <div class="card">
        <h3>Install status</h3>
        <div class="muted" id="installStatus">Waiting…</div>
      </div>
      <div class="card">
        <h3>Scopes</h3>
        <div class="muted kvs" id="scopes">read_products, write_products, read_customers, write_customers</div>
      </div>
      <div class="card">
        <h3>API Key (injected)</h3>
        <div class="muted kvs" id="apiKey">%SHOPIFY_API_KEY%</div>
      </div>
    </div>
  </div>

  <script type="module">
    import * as AppBridge from "https://cdn.shopify.com/shopifycloud/app-bridge/v3/app-bridge.min.js";
    import { getShopOrigin } from "https://cdn.shopify.com/shopifycloud/app-bridge-utilities/v3/index.js";

    // pulled from server.js injection
    const API_KEY = document.getElementById("apiKey").textContent.trim();

    // Shopify provides shop & host in the query string
    const params = new URLSearchParams(window.location.search);
    const shop = params.get("shop") || getShopOrigin();
    const host = params.get("host"); // base64 admin host – required by App Bridge v3

    // Update UI
    document.getElementById("shopLine").textContent = `Shop: ${shop}`;
    document.getElementById("installStatus").textContent = "Installed ✅";

    // Initialize App Bridge
    const app = AppBridge.default.createApp({
      apiKey: API_KEY,
      host,         // MUST come from Shopify (querystring)
      forceRedirect: true,
    });

    // Wire buttons
    document.getElementById("checkApiBtn").addEventListener("click", async () => {
      try {
        const r = await fetch("/api/me", { credentials: "include" });
        const j = await r.json();
        alert(j?.message || "OK");
      } catch (e) {
        alert("API check failed");
      }
    });

    document.getElementById("openAdminBtn").addEventListener("click", () => {
      AppBridge.actions.Navigation.Navigation.create(app).dispatch(
        AppBridge.actions.Navigation.Action.ADMIN_PATH, "/"
      );
    });
  </script>
</body>
</html>
