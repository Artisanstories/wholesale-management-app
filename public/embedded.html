<!-- public/embedded.html -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Wholesale Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Polaris (CDN, no build) -->
  <link rel="stylesheet" href="https://unpkg.com/@shopify/polaris@12.7.0/build/esm/styles.css" />

  <style>
    body { background:#0b0d13; color:#fff; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; }
    .Page { max-width: 1080px; margin: 32px auto; padding: 0 16px; }
    .Card { background:#111523; border:1px solid #1c2236; border-radius:12px; padding:20px; }
    .Grid { display:grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap:16px; margin-top:16px; }
    .Badge { font-size:12px; padding:4px 8px; border-radius:999px; background:#0b3b2e; color:#19ffa2; margin-left:8px; }
    .Button { background:#2a61ff; color:#fff; border:0; border-radius:8px; padding:10px 14px; cursor:pointer; }
    .Button.secondary { background:#222a42; }
    .Mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    .Row { display:flex; gap:10px; flex-wrap:wrap; }
    .Key { color:#9fb3ff; }
  </style>
</head>
<body>
  <main class="Page">
    <div class="Card">
      <h1 style="font-size:28px; margin:0 0 12px;">
        Wholesale Dashboard <span class="Badge">embedded</span>
      </h1>
      <div style="opacity:.8; margin-bottom:16px;">Shop: <span id="shop" class="Mono">loading…</span></div>

      <div class="Row" style="margin-bottom:16px;">
        <button class="Button" id="checkApi">Check API</button>
        <button class="Button secondary" id="openAdmin">Open Shopify Admin</button>
      </div>

      <div class="Grid">
        <div class="Card">
          <div style="opacity:.7; margin-bottom:6px;">Install status</div>
          <div id="installStatus" class="Mono">Waiting…</div>
        </div>
        <div class="Card">
          <div style="opacity:.7; margin-bottom:6px;">Scopes</div>
          <div class="Mono" id="scopes">read_products, write_products, read_customers, write_customers</div>
        </div>
        <div class="Card">
          <div style="opacity:.7; margin-bottom:6px;">API Key (injected)</div>
          <div class="Mono"><span class="Key" id="apiKey">%SHOPIFY_API_KEY%</span></div>
        </div>
      </div>
    </div>
  </main>

  <!-- App Bridge (vanilla UMD) -->
  <script src="https://unpkg.com/@shopify/app-bridge@3.7.14/umd/index.js"></script>
  <script>
    // --- helpers ---
    const qp = new URLSearchParams(window.location.search);
    const shop = qp.get('shop');
    const host = qp.get('host');
    document.getElementById('shop').textContent = shop || '(missing shop)';

    // Render injects this value in server.js
    const apiKey = document.getElementById('apiKey').textContent.trim();

    // App Bridge config
    if (!apiKey || !host || !shop) {
      document.getElementById('installStatus').textContent = 'Missing apiKey/host/shop';
    }

    const AppBridge = window['app-bridge'];
    let app;
    try {
      app = AppBridge.default.createApp({
        apiKey,
        host, // base64 host from Shopify
        forceRedirect: true
      });
      document.getElementById('installStatus').textContent = 'Installed';
    } catch (e) {
      document.getElementById('installStatus').textContent = 'App Bridge failed';
      console.error('[app-bridge]', e);
    }

    // Buttons
    document.getElementById('checkApi').addEventListener('click', async () => {
      try {
        const r = await fetch('/api/me', { credentials: 'include' });
        const j = await r.json();
        alert('API says: ' + JSON.stringify(j));
      } catch (e) {
        alert('Request failed: ' + e?.message);
      }
    });

    document.getElementById('openAdmin').addEventListener('click', () => {
      if (!app) return;
      const actions = AppBridge.actions;
      const Redirect = actions.Redirect;
      const redirect = Redirect.create(app);
      redirect.dispatch(Redirect.Action.ADMIN_PATH, '/');
    });
  </script>
</body>
</html>
