<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Wholesale App</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; background:#0b1220; color:#e6ebff; }
      .wrap { max-width: 720px; margin: 10vh auto; padding: 24px; background: #11172a; border-radius: 16px; border:1px solid #253055; }
      h1 { margin: 0 0 12px; font-size: 28px; }
      p { opacity: .9; line-height: 1.6; }
      code, .chip { background:#0d1833; border:1px solid #243158; padding:4px 8px; border-radius:8px; }
      .row { display:flex; gap:12px; margin-top: 16px; flex-wrap: wrap; }
      a.btn { display:inline-block; padding:10px 14px; border-radius:10px; border:1px solid #2c3a66; text-decoration:none; color:#e6ebff }
      a.btn:hover { background:#0d1833; }
      .ok { color:#66ffa6; font-weight:600 }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Wholesale App <span class="ok">installed</span> ✅</h1>
      <p>
        Shop: <code id="shop">—</code>
      </p>
      <p>
        Your backend is live and OAuth succeeded. This page is just a placeholder. Replace it later
        with your real dashboard (embedded or standalone).
      </p>
      <div class="row">
        <a class="btn" href="/api/me">Check API</a>
        <a class="btn" id="openAdmin" target="_blank" rel="noreferrer">Open Shopify Admin</a>
      </div>
    </div>

    <script>
      const params = new URLSearchParams(location.search);
      const shop = params.get("shop") || "(unknown)";
      document.getElementById("shop").textContent = shop;
      document.getElementById("openAdmin").href = shop ? `https://${shop}/admin/apps` : `https://admin.shopify.com/store`;
    </script>
  </body>
</html>
